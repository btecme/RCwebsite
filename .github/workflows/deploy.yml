name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          RESPONSE=$(curl -s -X POST "https://api.vercel.com/v13/deployments?teamId=${VERCEL_TEAM_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "repairclaws-com",
              "gitSource": {
                "type": "github",
                "repoId": 1217437598,
                "ref": "main"
              }
            }')
          echo "$RESPONSE" | grep -q '"url"' && echo "Deployment triggered successfully" || (echo "Deploy error: $RESPONSE" && exit 1)
